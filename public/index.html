<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перемещения товаров</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script defer src="/js/socket.js"></script>
    <script defer src="/js/table.js"></script>
</head>
<body>
    <div id="app">
        <div id="login-form" class="modal">
            <div class="modal-content">
                <h2>Вход в систему</h2>
                <input type="text" id="username" placeholder="Логин" autocomplete="off">
                <input type="password" id="password" placeholder="Пароль">
                <button id="login-btn">Войти</button>
                <p id="login-error" class="error"></p>
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <div class="header">
                <div class="header-left">
                    <h1><i class="fas fa-exchange-alt"></i> Перемещения товаров</h1>
                </div>
                <div class="header-right">
                    <span id="current-user" class="user-badge"><i class="fas fa-user"></i> </span>
                    <button id="admin-btn" class="btn btn-outline" style="display: none;"><i class="fas fa-cog"></i> Админка</button>
                    <button id="audio-btn" class="btn btn-outline" style="display: none;"><i class="fas fa-microphone"></i> Аудио</button>
                    <button id="logout-btn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
            </div>

            <div class="toolbar">
                <div class="formula-bar">
                    <span class="formula-label">fx</span>
                    <input type="text" id="formula-input" placeholder="Введите значение" disabled>
                </div>
                <div class="toolbar-buttons">
                    <button id="edit-btn" class="btn btn-primary" disabled><i class="fas fa-pen"></i> Редактировать</button>
                    <button id="save-btn" class="btn btn-success" style="display: none;"><i class="fas fa-check"></i> Сохранить</button>
                    <button id="cancel-btn" class="btn btn-secondary" style="display: none;"><i class="fas fa-times"></i> Отмена</button>
                </div>
            </div>

            <div id="table-container"></div>
            <div id="status-bar"></div>
        </div>
    </div>
</body>
</html>
