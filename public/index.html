<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перемещения товаров</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script defer src="/js/socket.js"></script>
    <script defer src="/js/table.js"></script>
</head>
<body>
    <div id="app">
        <div id="login-form" class="modal">
            <div class="modal-content">
                <h2><i class="fas fa-sign-in-alt"></i> Вход в систему</h2>
                <input type="text" id="username" placeholder="Логин" autocomplete="off">
                <input type="password" id="password" placeholder="Пароль">
                <button id="login-btn" class="btn btn-primary">Войти</button>
                <p id="login-error" class="error"></p>
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <div class="header">
                <div class="header-left">
                    <h1><i class="fas fa-exchange-alt"></i> Перемещения товаров</h1>
                    <div class="nav-links" id="nav-links">
                        <!-- Навигационные кнопки будут вставлены через JS -->
                    </div>
                </div>
                <div class="header-right">
                    <span id="current-user" class="user-badge"><i class="fas fa-user"></i> </span>
                    <button id="logout-btn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
            </div>

            <div id="table-container" class="table-container"></div>
            <div id="status-bar"></div>
        </div>
    </div>
</body>
</html>
