<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администрирование</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script defer src="/js/admin.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1><i class="fas fa-cog"></i> Панель администратора</h1>
        </div>
        <div class="header-right">
            <span id="current-user" class="user-badge"><i class="fas fa-user"></i> </span>
            <button id="back-to-table" class="btn btn-outline"><i class="fas fa-arrow-left"></i> К таблице</button>
            <button id="audio-btn" class="btn btn-outline"><i class="fas fa-microphone"></i> Аудио</button>
            <button id="logout-btn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="users">Пользователи</button>
        <button class="tab-btn" data-tab="history">История изменений</button>
    </div>

    <div id="users-tab" class="tab-content active">
        <h2>Управление пользователями</h2>
        <form id="add-user-form">
            <input type="text" id="new-username" placeholder="Логин" required>
            <input type="password" id="new-password" placeholder="Пароль" required>
            <div class="role-checkboxes">
                <label><input type="checkbox" name="roles" value="admin"> Администратор</label>
                <label><input type="checkbox" name="roles" value="audio"> Аудио</label>
        <!-- можно добавить другие роли -->
            </div>
            <button type="submit">Добавить</button>
        </form>
        <table id="users-table" class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Логин</th>
                    <th>Роли</th>
                    <th>Дата создания</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="history-tab" class="tab-content">
        <h2>История изменений</h2>
        <div class="filters">
            <select id="filter-user">
                <option value="">Все пользователи</option>
            </select>
            <input type="date" id="filter-from" placeholder="С даты">
            <input type="date" id="filter-to" placeholder="По дату">
            <button id="apply-filters" class="btn btn-primary">Применить</button>
        </div>
        <table id="history-table" class="admin-table">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Пользователь</th>
                    <th>Строка</th>
                    <th>Столбец</th>
                    <th>Было</th>
                    <th>Стало</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</body>
</html>
