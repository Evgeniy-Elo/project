<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аудио-контроль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Дополнительные стили для карточек агентов */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .agent-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .badge.recording { background: #e6f4ea; color: #0f9d58; }
        .badge.stopped { background: #fff4e5; color: #b45f06; }
        .badge.offline { background: #fce8e6; color: #d93025; }
        .alert {
            background: #fce8e6;
            border-left: 4px solid #d93025;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 14px;
        }
        .files-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            margin: 12px 0;
            background: var(--bg-light);
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            border-bottom: 1px solid #eee;
        }
        .file-item:last-child { border-bottom: none; }
        .file-item span { flex: 1; font-size: 13px; }
        .play-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 16px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        audio {
            width: 100%;
            margin-top: 12px;
        }
        .cleanup-form {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 12px;
        }
        .cleanup-form input {
            width: 70px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        .nav-link i { margin-right: 5px; }
        .nav-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1><i class="fas fa-microphone"></i> Аудио-контроль</h1>
            <a href="/" class="nav-link"><i class="fas fa-table"></i> Таблица перемещений</a>
        </div>
        <div class="header-right">
            <span id="current-user" class="user-badge"><i class="fas fa-user"></i> </span>
            <a href="/admin.html" class="btn btn-outline" id="admin-link" style="display: none;"><i class="fas fa-cog"></i> Админка</a>
            <button id="logout-btn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>

    <div class="container" style="padding: 20px;">
        <div id="agents-container" class="agents-grid">
            <!-- Карточки будут вставлены через JS -->
        </div>
    </div>

    <script src="/js/audio.js"></script>
</body>
</html>
