<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аудио-контроль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1><i class="fas fa-microphone"></i> Аудио-контроль</h1>
            <div class="nav-links" id="nav-links">
                <!-- Навигационные кнопки будут вставлены через JS -->
            </div>
        </div>
        <div class="header-right">
            <span id="current-user" class="user-badge"><i class="fas fa-user"></i> </span>
            <button id="logout-btn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>

    <div class="agents-grid" id="agents-container">
        <!-- Карточки будут вставлены через JS -->
    </div>

    <script src="/js/audio.js"></script>
</body>
</html>
